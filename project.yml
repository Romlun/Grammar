name: WritePro
options:
  bundleIdPrefix: com.romlun
  deploymentTarget:
    macOS: "14.0"
    iOS: "26.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: 5.9

targets:
  WritePro:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/WritePro
    resources:
      - path: Sources/WritePro/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.romlun.writepro
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"

  WriteProiOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/WritePro
    resources:
      - path: Sources/WritePro/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.romlun.writepro-ios
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: AUH49LC52B
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
    dependencies:
      - target: WriteProKeyboard
        embed: true

  WriteProKeyboard:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/WriteProKeyboard
    info:
      path: Sources/WriteProKeyboard/Info.plist
      properties:
        CFBundleDisplayName: WritePro
        NSExtension:
          NSExtensionAttributes:
            IsASCIICapable: false
            PrefersRightToLeft: false
            PrimaryLanguage: en-US
            RequestsOpenAccess: true
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).KeyboardViewController
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.romlun.writepro-ios.keyboard
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: AUH49LC52B
