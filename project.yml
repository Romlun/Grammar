name: WritePro
options:
  bundleIdPrefix: com.romlun
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: 5.9

targets:
  WritePro:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/WritePro
    resources:
      - path: Sources/WritePro/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.romlun.writepro
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
